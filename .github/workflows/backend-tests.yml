name: Backend CI (Spring Boot Tests)

on:
  pull_request:
    branches:
      - main
    paths:
      - 'implementation/backend/**'

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código del repositorio
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Configurar el entorno con Java 21 (Temurin es la distribución oficial recomendada)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    # 3. Dar permisos de ejecución al Maven Wrapper y correr los tests
    - name: Run Unit Tests with Maven Wrapper
      run: |
        chmod +x mvnw
        ./mvnw clean test
      working-directory: implementation/backend/medical-appointments