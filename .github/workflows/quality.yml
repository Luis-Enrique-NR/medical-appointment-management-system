name: Quality Checks (testing-calidad)

# Revisiones de calidad del proyecto: pruebas de backend (JUnit 5),
# pruebas E2E de frontend (Playwright), typecheck y lint.
on:
  push:
    branches:
      - testing-calidad
  pull_request:
    branches:
      - testing-calidad
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  # ------------------------------------------------------------------
  # Backend - Spring Boot / JUnit 5
  # ------------------------------------------------------------------
  backend:
    name: Backend · JUnit 5
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/backend/medical-appointments
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run unit tests
        run: |
          chmod +x mvnw
          ./mvnw --batch-mode clean test

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: implementation/backend/medical-appointments/target/surefire-reports/
          if-no-files-found: ignore

  # ------------------------------------------------------------------
  # Frontend - lint + typecheck + build
  # ------------------------------------------------------------------
  frontend-quality:
    name: Frontend · Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/frontend-next
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: implementation/frontend-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc)
        run: npx tsc --noEmit

      - name: Lint (eslint)
        run: npm run lint

      - name: Build
        run: npm run build

  # ------------------------------------------------------------------
  # Frontend - Playwright E2E
  # ------------------------------------------------------------------
  frontend-e2e:
    name: Frontend · Playwright E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/frontend-next
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: implementation/frontend-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: implementation/frontend-next/playwright-report/
          retention-days: 7
          if-no-files-found: ignore
